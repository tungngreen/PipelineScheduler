syntax = "proto3";
import "google/protobuf/empty.proto";

option java_multiple_files = true;
option objc_class_prefix = "HLW";

package pipelinescheduler;

enum TRANSFER_TYPE {
  REMOTE = 0;
  MEMORY = 1;
  GPU = 2;
}

message ImageData {
  bool is_encoded = 1;
  int32 width = 2;
  int32 height = 3;
  uint32 datalen = 4;
  repeated int64 timestamp = 5;
  string path = 6;
  uint32 slo = 7;
  bytes data = 8;
}

message ImageDataPayload {
  repeated ImageData elements = 1;
}
